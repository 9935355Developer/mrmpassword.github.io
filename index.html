<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Enter Code</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      background: #f3f4f6;
    }
    .card {
      background: #ffffff;
      padding: 28px;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(16,24,40,0.08);
      text-align: center;
      width: 320px;
    }
    h1 { margin: 0 0 10px; font-size: 18px; color:#111827; }
    p { margin: 0 0 18px; color:#4b5563; }
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .msg { margin-top: 12px; color: #dc2626; font-size: 13px; height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Enter the code below</h1>
    <p>Type the code and press Enter</p>
    <input id="codeInput" type="password" placeholder="Enter code" />
    <button id="submitBtn">Enter</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const CORRECT = "airskymath404";
    const targetUrl = "https://fayadgamer13.github.io/AirSky.github.io";
    const input = document.getElementById("codeInput");
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    function tryEnter() {
      if (input.value === CORRECT) {
        // clear any message then redirect
        msg.style.color = "#16a34a";
        msg.textContent = "Code accepted. Redirecting…";
        setTimeout(() => { window.location.href = targetUrl; }, 400);
      } else {
        msg.style.color = "#dc2626";
        msg.textContent = "Incorrect code.";
        input.value = "";
        input.focus();
      }
    }

    btn.addEventListener("click", tryEnter);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryEnter();
    });
    input.focus();
  </script>
</body>
</html>
